<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Русский курсив — Russian Cursive</title>

<!-- PWA: installable / offline -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1a3a6b">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Курсив">

<!-- Cyrillic handwriting fonts from Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Lobster&family=Marck+Script&display=swap" rel="stylesheet">

<style>
  /* Authentic Russian school cursive (ParaType Propisi, 1997).
     Local file first, jsDelivr CDN fallback when hosted. */
  @font-face {
    font-family: 'Propisi';
    src: url('Propisi.ttf') format('truetype'),
         url('https://cdn.jsdelivr.net/gh/zorinalexey/win-fonts@main/Propisi.TTF') format('truetype');
    font-display: swap;
  }

  :root {
    --bg: #f4f1ea;
    --paper: #fffdf8;
    --ink: #1a3a6b;
    --line: #c9d6e8;
    --ui: #2b2b2b;
    --kbbg: #d9d3c4;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
    overscroll-behavior: none;
    background: #e8e3d8;
    font-family: -apple-system, "SF Pro Text", "Helvetica Neue", "Apple SD Gothic Neo", sans-serif;
    color: var(--ui);
  }

  /* ---- App shell: fills the viewport, never scrolls as a whole ---- */
  .app {
    height: 100dvh;
    max-width: 720px;
    margin: 0 auto;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 40px rgba(0,0,0,.06);
  }

  /* Top bar */
  .bar {
    flex: none;
    display: flex; align-items: center; justify-content: space-between;
    padding: max(8px, env(safe-area-inset-top)) 14px 8px;
    background: var(--ink);
    color: #fff;
  }
  .bar h1 { margin: 0; font-size: 15px; font-weight: 600; letter-spacing: .2px; }
  .bar .gear {
    background: rgba(255,255,255,.15); border: none; color: #fff;
    width: 34px; height: 34px; border-radius: 9px; font-size: 17px; cursor: pointer;
  }

  /* Input + output area (the flexible middle) */
  .io {
    flex: 1 1 auto;
    min-height: 0;
    display: flex; flex-direction: column;
    gap: 8px;
    padding: 10px 12px;
  }
  #input {
    flex: none;
    width: 100%;
    height: 58px;
    padding: 10px 12px;
    font-size: 17px;            /* >=16px so iOS doesn't zoom on focus */
    line-height: 1.4;
    border: 1px solid #d8d2c4;
    border-radius: 11px;
    background: #fff;
    color: #222;
    resize: none;
    outline: none;
  }
  #input:focus { border-color: var(--ink); }

  .sheet {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    background: var(--paper);
    border-radius: 12px;
    padding: 16px 16px;
    box-shadow: 0 4px 14px rgba(0,0,0,.07);
    background-image: repeating-linear-gradient(
      to bottom, transparent 0, transparent calc(1.7em - 1px),
      var(--line) calc(1.7em - 1px), var(--line) 1.7em);
    background-size: 100% 1.7em;
  }
  .output {
    font-family: 'Propisi', cursive;
    color: var(--ink);
    font-size: 40px;
    line-height: 1.7em;
    white-space: pre-wrap;
    word-break: break-word;
    margin: 0;
  }
  .output:empty::before { content: "Здесь появится курсив…"; color: #c3bca8; }

  /* On-screen Cyrillic keyboard (always visible) */
  .keyboard {
    flex: none;
    background: var(--kbbg);
    padding: 6px 5px;
    user-select: none;
  }
  .kb-row { display: flex; gap: 5px; margin-bottom: 5px; }
  .kb-row:last-child { margin-bottom: 0; }
  .key {
    flex: 1 1 0; min-width: 0;
    height: 46px;
    display: flex; align-items: center; justify-content: center;
    background: #fff;
    border: 1px solid #c4bdac;
    border-bottom-width: 2px;
    border-radius: 7px;
    font-size: 18px;
    color: #222;
    cursor: pointer;
  }
  .key:active { background: #cfc7b4; transform: translateY(1px); }
  .key.fn { font-size: 13px; color: #555; background: #efe9dc; flex: 1.5 1 0; }
  .key.space { flex: 4 1 0; font-size: 13px; color: #777; }
  .key.shift.on { background: var(--ink); color: #fff; border-color: var(--ink); }

  /* Bottom action bar */
  .actions {
    flex: none;
    display: flex; gap: 8px;
    padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
    background: var(--kbbg);
  }
  .actions button {
    flex: 1;
    height: 46px;
    border: none; border-radius: 11px;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
  }
  .btn-primary { background: var(--ink); color: #fff; }
  .btn-soft { background: #fff; color: var(--ink); border: 1px solid #c4bdac !important; }

  /* Settings bottom sheet */
  .backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.4);
    opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 30;
  }
  .backdrop.show { opacity: 1; pointer-events: auto; }
  .settings {
    position: fixed; left: 0; right: 0; bottom: 0;
    max-width: 720px; margin: 0 auto;
    background: var(--paper);
    border-radius: 18px 18px 0 0;
    padding: 8px 18px calc(20px + env(safe-area-inset-bottom));
    max-height: 80dvh; overflow-y: auto;
    transform: translateY(110%); transition: transform .25s ease;
    z-index: 31;
    box-shadow: 0 -10px 30px rgba(0,0,0,.18);
  }
  .settings.open { transform: translateY(0); }
  .grab { width: 44px; height: 5px; border-radius: 3px; background: #ccc4b2; margin: 4px auto 12px; }
  .settings h2 { font-size: 14px; margin: 0 0 14px; color: #555; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; font-size: 13px; color: #555; }
  .field select, .field input[type=range] { accent-color: var(--ink); }
  .field select {
    padding: 9px 10px; border-radius: 9px; border: 1px solid #ccc; background: #fff; font-size: 14px;
  }
  .switch { flex-direction: row; align-items: center; justify-content: space-between; gap: 12px; }
  .switch input { width: 20px; height: 20px; accent-color: var(--ink); }
  .set-row { display: flex; gap: 8px; }
  .set-row button {
    flex: 1; height: 42px; border-radius: 9px; border: 1px solid var(--ink);
    background: #fff; color: var(--ink); font-size: 13px; cursor: pointer;
  }
  .warn {
    margin: 0 0 14px; padding: 11px 12px; background: #fff3e0;
    border: 1px solid #f0c887; border-radius: 10px; font-size: 12.5px;
    line-height: 1.5; color: #7a5012;
  }
  .warn b { color: #5a3a08; }
  .credit { margin: 6px 0 0; font-size: 11px; color: #b3ab98; line-height: 1.5; }
</style>
</head>
<body>

<div class="app">

  <header class="bar">
    <h1>✒️ Русский курсив</h1>
    <button class="gear" id="gear" type="button" aria-label="설정">⚙</button>
  </header>

  <main class="io">
    <textarea id="input" inputmode="none" placeholder="Напишите слово… (화면 자판으로 입력)"></textarea>
    <div class="sheet"><p id="output" class="output"></p></div>
  </main>

  <section class="keyboard" id="keyboard"></section>

  <div class="actions">
    <button class="btn-primary" id="speak" type="button">🔊 Прослушать</button>
    <button class="btn-soft" id="clear" type="button">✕ Очистить</button>
  </div>
</div>

<!-- Settings sheet -->
<div class="backdrop" id="backdrop"></div>
<aside class="settings" id="settings">
  <div class="grab"></div>
  <h2>⚙ 설정 / Настройки</h2>

  <div id="voiceWarn" class="warn" hidden></div>

  <label class="field switch">
    <span>📱 내 폰 키보드로 입력<br><small style="color:#999">화면 자판 대신 기기 키보드 사용</small></span>
    <input type="checkbox" id="ownkb">
  </label>

  <label class="field">
    Шрифт / 글씨체
    <select id="font">
      <option value="'Propisi', cursive">Propisi ★ 정통 학교 필기체</option>
      <option value="'Pacifico', cursive">Pacifico (연결 붓글씨)</option>
      <option value="'Lobster', cursive">Lobster (굵은 필기체)</option>
      <option value="'Marck Script', cursive">Marck Script (가는 필기체)</option>
    </select>
  </label>

  <label class="field">
    Размер / 크기: <span id="sizeVal">40</span>px
    <input id="size" type="range" min="24" max="90" value="40">
  </label>

  <label class="field">
    Голос / 음성
    <select id="voice"></select>
  </label>

  <label class="field">
    Скорость / 속도: <span id="rateVal">1.0</span>×
    <input id="rate" type="range" min="0.5" max="1.5" step="0.1" value="1">
  </label>

  <div class="set-row">
    <button id="copy" type="button">📋 텍스트 복사</button>
  </div>

  <p class="credit">필기체 폰트: ParaType «Propisi» (CDN). 발음: 기기 내장 음성합성.</p>
  <p class="credit">feedback : <a href="mailto:mongsil88@snu.ac.kr">mongsil88@snu.ac.kr</a></p>
</aside>

<script>
  const input   = document.getElementById('input');
  const output  = document.getElementById('output');
  const font     = document.getElementById('font');
  const size     = document.getElementById('size');
  const sizeVal  = document.getElementById('sizeVal');

  function render() {
    output.textContent = input.value;
    output.style.fontFamily = font.value;
    output.style.fontSize = size.value + 'px';
    sizeVal.textContent = size.value;
  }
  input.addEventListener('input', render);
  font.addEventListener('change', render);
  size.addEventListener('input', render);

  document.getElementById('clear').addEventListener('click', () => {
    input.value = '';
    render();
  });

  document.getElementById('copy').addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(input.value);
      const b = document.getElementById('copy');
      const t = b.textContent; b.textContent = '복사됨 ✓';
      setTimeout(() => b.textContent = t, 1200);
    } catch (e) { alert('복사 실패'); }
  });

  render();

  /* ---------- Block the device keyboard on touch screens ---------- */
  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  function setOwnKeyboard(on) {
    // on = use the phone's own keyboard; off = use the on-screen Cyrillic keyboard
    if (on) {
      input.readOnly = false;
      input.setAttribute('inputmode', 'text');
      keyboard.style.display = 'none';
    } else {
      input.readOnly = isTouch;          // readonly on touch => no native keyboard
      input.setAttribute('inputmode', 'none');
      keyboard.style.display = '';
    }
  }

  /* ---------- Text-to-speech (Russian) ---------- */
  const rate = document.getElementById('rate');
  const rateVal = document.getElementById('rateVal');
  const speakBtn = document.getElementById('speak');
  const voiceSel = document.getElementById('voice');
  const voiceWarn = document.getElementById('voiceWarn');

  rate.addEventListener('input', () => rateVal.textContent = (+rate.value).toFixed(1));

  let russianVoices = [];
  function populateVoices() {
    const all = speechSynthesis.getVoices();
    russianVoices = all.filter(v => v.lang && v.lang.toLowerCase().startsWith('ru'));
    voiceSel.innerHTML = '';
    if (russianVoices.length) {
      russianVoices.forEach((v, i) => {
        const o = document.createElement('option');
        o.value = i; o.textContent = v.name + ' (' + v.lang + ')';
        voiceSel.appendChild(o);
      });
      voiceWarn.hidden = true;
    } else {
      const o = document.createElement('option');
      o.textContent = '러시아어 음성 없음';
      voiceSel.appendChild(o);
      voiceWarn.innerHTML =
        '⚠️ <b>러시아어 음성이 설치돼 있지 않아 글자를 하나씩 읽어요.</b><br>' +
        '<b>iPhone</b>: 설정 → 손쉬운 사용 → 콘텐츠 말하기 → 음성 → 러시아어 추가.<br>' +
        '<b>Mac</b>: 시스템 설정 → 손쉬운 사용 → 음성 콘텐츠 → 시스템 음성 → 음성 관리 → Russian(Milena).<br>' +
        '추가 후 새로고침하세요.';
      voiceWarn.hidden = false;
    }
  }
  populateVoices();
  speechSynthesis.onvoiceschanged = populateVoices;

  speakBtn.addEventListener('click', () => {
    const text = input.value.trim();
    if (!text) return;
    if (speechSynthesis.speaking) { speechSynthesis.cancel(); return; }
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ru-RU'; u.rate = +rate.value;
    const v = russianVoices[+voiceSel.value];
    if (v) u.voice = v;
    u.onstart = () => speakBtn.textContent = '⏹ Стоп';
    u.onend = u.onerror = () => speakBtn.textContent = '🔊 Прослушать';
    speechSynthesis.speak(u);
  });

  /* ---------- On-screen Cyrillic keyboard (ЙЦУКЕН) ---------- */
  const keyboard = document.getElementById('keyboard');
  const letterRows = [
    ['й','ц','у','к','е','н','г','ш','щ','з','х','ъ'],
    ['ф','ы','в','а','п','р','о','л','д','ж','э'],
    ['я','ч','с','м','и','т','ь','б','ю','ё'],
  ];
  const letterKeys = [];
  let shiftOn = false;

  function insertText(text) {
    const s = input.selectionStart ?? input.value.length;
    const e = input.selectionEnd ?? input.value.length;
    input.value = input.value.slice(0, s) + text + input.value.slice(e);
    const pos = s + text.length;
    try { input.selectionStart = input.selectionEnd = pos; } catch (_) {}
    render();
  }
  function backspace() {
    const s = input.selectionStart ?? input.value.length;
    const e = input.selectionEnd ?? input.value.length;
    if (s === e && s > 0) {
      input.value = input.value.slice(0, s - 1) + input.value.slice(e);
      try { input.selectionStart = input.selectionEnd = s - 1; } catch (_) {}
    } else {
      input.value = input.value.slice(0, s) + input.value.slice(e);
      try { input.selectionStart = input.selectionEnd = s; } catch (_) {}
    }
    render();
  }
  function setShift(on) {
    shiftOn = on;
    letterKeys.forEach(k => k.el.textContent = on ? k.char.toUpperCase() : k.char);
    document.querySelectorAll('.key.shift').forEach(b => b.classList.toggle('on', on));
  }
  function makeKey(label, cls) {
    const b = document.createElement('div');
    b.className = 'key' + (cls ? ' ' + cls : '');
    b.textContent = label;
    // use pointerdown + preventDefault so the readonly textarea never tries to focus
    b.addEventListener('pointerdown', (ev) => ev.preventDefault());
    return b;
  }

  letterRows.forEach(row => {
    const r = document.createElement('div');
    r.className = 'kb-row';
    row.forEach(ch => {
      const el = makeKey(ch);
      letterKeys.push({ el, char: ch });
      el.addEventListener('click', () => {
        insertText(shiftOn ? ch.toUpperCase() : ch);
        if (shiftOn) setShift(false);
      });
      r.appendChild(el);
    });
    keyboard.appendChild(r);
  });

  const bottom = document.createElement('div');
  bottom.className = 'kb-row';
  const shiftKey = makeKey('⇧', 'fn shift');
  shiftKey.addEventListener('click', () => setShift(!shiftOn));
  bottom.appendChild(shiftKey);
  ['.', ',', '?', '!'].forEach(p => {
    const el = makeKey(p);
    el.addEventListener('click', () => insertText(p));
    bottom.appendChild(el);
  });
  const space = makeKey('пробел', 'space');
  space.addEventListener('click', () => insertText(' '));
  bottom.appendChild(space);
  const back = makeKey('⌫', 'fn');
  back.addEventListener('click', backspace);
  bottom.appendChild(back);
  keyboard.appendChild(bottom);

  /* ---------- Settings sheet open/close ---------- */
  const settings = document.getElementById('settings');
  const backdrop = document.getElementById('backdrop');
  function openSettings(o) {
    settings.classList.toggle('open', o);
    backdrop.classList.toggle('show', o);
  }
  document.getElementById('gear').addEventListener('click', () => openSettings(true));
  backdrop.addEventListener('click', () => openSettings(false));

  document.getElementById('ownkb').addEventListener('change', (e) => {
    setOwnKeyboard(e.target.checked);
    if (e.target.checked) { input.focus(); }
  });

  // default: on-screen keyboard mode
  setOwnKeyboard(false);

  /* ---------- PWA service worker ---------- */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
  }
</script>
</body>
</html>
